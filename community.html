<!-- FitSofra Topluluk (Sofra) Modülü — index.html içine lazy-load edilir -->
<style>
.com-header{text-align:center;margin-bottom:16px}
.com-header h2{font-size:1.1rem;font-weight:900;margin-bottom:4px}
.com-header p{font-size:.72rem;color:var(--text2)}
.com-login-prompt{text-align:center;padding:40px 16px}
.com-login-prompt .clp-icon{font-size:3rem;margin-bottom:12px}
.com-login-prompt .clp-title{font-size:1rem;font-weight:800;margin-bottom:6px}
.com-login-prompt .clp-desc{font-size:.78rem;color:var(--text2);line-height:1.5;margin-bottom:16px}
.com-tabs{display:flex;gap:3px;margin-bottom:14px;background:var(--glass);border-radius:12px;padding:3px}
.com-tab{flex:1;padding:8px 4px;text-align:center;font-size:.72rem;font-weight:700;border-radius:9px;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:all .2s;font-family:var(--font,system-ui)}
.com-tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(255,107,61,.3)}
.com-card{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;animation:fadeUp .3s ease}
.com-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.com-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--accent)}
.com-avatar-placeholder{width:36px;height:36px;border-radius:50%;background:var(--accent-glow);display:flex;align-items:center;justify-content:center;font-size:1.1rem;border:2px solid var(--accent)}
.com-user-info{flex:1;min-width:0}
.com-username{font-weight:700;font-size:.82rem}
.com-time{font-size:.62rem;color:var(--text2)}
.com-streak-badge{padding:3px 8px;border-radius:8px;font-size:.6rem;font-weight:800;background:var(--accent-glow);color:var(--accent);flex-shrink:0}
.com-card-body{margin-bottom:10px}
.com-macros-bar{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.com-macros-bar span{font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--bg)}
.com-meal-preview{display:flex;gap:4px;flex-wrap:wrap}
.com-meal-chip{font-size:.65rem;padding:3px 8px;border-radius:8px;background:var(--glass);border:1px solid var(--border);color:var(--text2)}
.com-card-footer{display:flex;align-items:center;gap:12px;padding-top:8px;border-top:1px solid var(--border)}
.com-action-btn{background:none;border:none;color:var(--text2);font-size:.82rem;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:var(--font,system-ui);padding:4px 0;transition:all .2s}
.com-action-btn:active{transform:scale(.92)}
.com-action-btn.liked{color:var(--accent)}
.com-compose{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:14px}
.com-compose textarea{width:100%;padding:10px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:.82rem;font-family:var(--font,system-ui);resize:none;min-height:60px;outline:none}
.com-compose textarea:focus{border-color:var(--accent)}
.com-compose-actions{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.com-leaderboard-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--glass);border:1px solid var(--border);border-radius:12px;margin-bottom:6px}
.com-lb-rank{font-size:1.1rem;font-weight:900;min-width:28px;text-align:center}
.com-lb-info{flex:1;min-width:0}
.com-lb-name{font-weight:700;font-size:.82rem}
.com-lb-stats{font-size:.65rem;color:var(--text2)}
.com-lb-value{font-size:.88rem;font-weight:900;color:var(--accent);text-align:right}
.com-challenge-card{background:linear-gradient(135deg,var(--accent-glow),rgba(160,124,248,.05));border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.com-challenge-card h4{font-size:.85rem;font-weight:800;margin-bottom:4px}
.com-challenge-card p{font-size:.72rem;color:var(--text2);line-height:1.4;margin-bottom:8px}
.com-challenge-progress{height:6px;background:var(--glass);border-radius:3px;overflow:hidden;margin-bottom:6px}
.com-challenge-progress div{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.com-challenge-meta{display:flex;justify-content:space-between;font-size:.65rem;color:var(--text2)}
.com-empty{text-align:center;padding:30px 16px;color:var(--text2);font-size:.82rem}
</style>

<div class="com-header">
  <h2>👥 Sofra</h2>
  <p>Toplulukla paylaş, motive ol, birlikte başar</p>
</div>

<div id="comLoginPrompt" style="display:none">
  <div class="com-login-prompt">
    <div class="clp-icon">👥</div>
    <div class="clp-title">Sofraya Katıl!</div>
    <div class="clp-desc">Beslenme günlüğünü paylaş, arkadaşlarınla yarış, haftalık meydan okumalara katıl.</div>
    <button onclick="if(typeof firebaseLogin==='function')firebaseLogin()" style="background:linear-gradient(135deg,#4285f4,#356ac3);color:#fff;border:none;border-radius:12px;padding:12px 28px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:var(--font,system-ui)">🔑 Google ile Giriş Yap</button>
  </div>
</div>

<div id="comMainContent" style="display:none">
  <!-- Sekmeler -->
  <div class="com-tabs">
    <button class="com-tab active" onclick="comSwitchTab('feed',this)">📢 Akış</button>
    <button class="com-tab" onclick="comSwitchTab('leaderboard',this)">🏆 Sıralama</button>
    <button class="com-tab" onclick="comSwitchTab('challenges',this)">🎯 Meydan Okuma</button>
  </div>

  <!-- Akış Paneli -->
  <div id="comPanelFeed">
    <!-- Paylaşım Kutusu -->
    <div class="com-compose">
      <textarea id="comPostText" placeholder="Bugün ne yedin? Nasıl gidiyor? 🍽️"></textarea>
      <div class="com-compose-actions">
        <div style="display:flex;gap:6px">
          <button onclick="comAttachToday()" style="background:var(--glass);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:.68rem;font-weight:700;color:var(--text2);cursor:pointer;font-family:var(--font,system-ui)">📊 Bugünkü Veriyi Ekle</button>
        </div>
        <button onclick="comSharePost()" style="background:var(--accent);color:#fff;border:none;border-radius:10px;padding:8px 18px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:var(--font,system-ui)">Paylaş</button>
      </div>
      <div id="comPostPreview" style="margin-top:6px"></div>
    </div>

    <!-- Feed -->
    <div id="comFeedList">
      <div style="text-align:center;padding:20px;color:var(--text2);font-size:.78rem">
        <span class="spinner" style="width:20px;height:20px;border-width:2px"></span><br><br>Gönderi yükleniyor...
      </div>
    </div>
  </div>

  <!-- Sıralama Paneli -->
  <div id="comPanelLeaderboard" style="display:none">
    <div style="display:flex;gap:3px;margin-bottom:10px">
      <button class="com-tab active" onclick="comLoadLeaderboard('streak',this)" style="flex:1;padding:6px;font-size:.68rem">🔥 Seri</button>
      <button class="com-tab" onclick="comLoadLeaderboard('cal',this)" style="flex:1;padding:6px;font-size:.68rem">🔥 Kalori</button>
      <button class="com-tab" onclick="comLoadLeaderboard('prot',this)" style="flex:1;padding:6px;font-size:.68rem">💪 Protein</button>
      <button class="com-tab" onclick="comLoadLeaderboard('consistency',this)" style="flex:1;padding:6px;font-size:.68rem">📅 Tutarlılık</button>
    </div>
    <div id="comLeaderboardList"></div>
  </div>

  <!-- Meydan Okuma Paneli -->
  <div id="comPanelChallenges" style="display:none">
    <div id="comChallengeList"></div>
  </div>
</div>

<div style="height:80px"></div>

<script>
// ═══════════════════════════════════════════
//  TOPLULUK (SOFRA) MODÜLü
// ═══════════════════════════════════════════

var comCurrentTab='feed';

function comInit(){
  // Auth durumunu kontrol et
  if(typeof auth!=='undefined'&&auth.currentUser){
    document.getElementById('comLoginPrompt').style.display='none';
    document.getElementById('comMainContent').style.display='block';
    comLoadFeed();
  }else{
    document.getElementById('comLoginPrompt').style.display='block';
    document.getElementById('comMainContent').style.display='none';
    // Auth değişikliğini dinle
    if(typeof auth!=='undefined'){
      auth.onAuthStateChanged(function(user){
        if(user){
          document.getElementById('comLoginPrompt').style.display='none';
          document.getElementById('comMainContent').style.display='block';
          comLoadFeed();
        }
      });
    }
  }
}

function comSwitchTab(tab,btn){
  comCurrentTab=tab;
  document.querySelectorAll('.com-tabs .com-tab').forEach(function(t){t.classList.remove('active');});
  if(btn)btn.classList.add('active');
  document.getElementById('comPanelFeed').style.display=tab==='feed'?'block':'none';
  document.getElementById('comPanelLeaderboard').style.display=tab==='leaderboard'?'block':'none';
  document.getElementById('comPanelChallenges').style.display=tab==='challenges'?'block':'none';
  if(tab==='leaderboard')comLoadLeaderboard('streak');
  if(tab==='challenges')comLoadChallenges();
}

// ═══ PAYLAŞIM / AKıŞ ═══
var _comAttachedData=null;

function comAttachToday(){
  try{
    var t=typeof getTotals==='function'?getTotals():{cal:0,prot:0,carb:0,fat:0};
    var target=typeof dailyTarget!=='undefined'?dailyTarget:2000;
    var waterMl=typeof getWaterMl==='function'?getWaterMl():0;
    _comAttachedData={cal:Math.round(t.cal),prot:Math.round(t.prot),carb:Math.round(t.carb),fat:Math.round(t.fat),target:target,water:waterMl};
    var pct=Math.round(t.cal/target*100);
    document.getElementById('comPostPreview').innerHTML='<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:.72rem;margin-top:4px">'
      +'<span style="color:var(--accent);font-weight:700">🔥 '+_comAttachedData.cal+'/'+target+' kcal ('+pct+'%)</span> · '
      +'P:'+_comAttachedData.prot+'g K:'+_comAttachedData.carb+'g Y:'+_comAttachedData.fat+'g · 💧'+(waterMl/1000).toFixed(1)+'L'
      +'</div>';
  }catch(e){
    if(typeof showToast==='function')showToast('⚠️ Veri alınamadı');
  }
}

async function comSharePost(){
  if(typeof db==='undefined'||!auth.currentUser){if(typeof showToast==='function')showToast('⚠️ Giriş yapmalısın');return;}
  var text=document.getElementById('comPostText').value.trim();
  if(!text&&!_comAttachedData){if(typeof showToast==='function')showToast('⚠️ Bir şeyler yaz veya veri ekle');return;}

  var user=auth.currentUser;
  var post={
    uid:user.uid,
    displayName:user.displayName||'Anonim',
    photoURL:user.photoURL||'',
    text:text,
    data:_comAttachedData||null,
    likes:[],
    likeCount:0,
    comments:[],
    createdAt:Date.now()
  };

  // Streak bilgisini ekle
  try{
    var streakEl=document.getElementById('streakCount');
    if(streakEl)post.streak=parseInt(streakEl.textContent)||0;
  }catch(e){}

  try{
    await db.collection('community_posts').add(post);
    document.getElementById('comPostText').value='';
    document.getElementById('comPostPreview').innerHTML='';
    _comAttachedData=null;
    if(typeof showToast==='function')showToast('📢 Paylaşıldı!');
    comLoadFeed();
  }catch(e){
    if(typeof showToast==='function')showToast('❌ Hata: '+e.message);
  }
}

async function comLoadFeed(){
  var el=document.getElementById('comFeedList');
  try{
    var snap=await db.collection('community_posts').orderBy('createdAt','desc').limit(30).get();
    if(snap.empty){
      el.innerHTML='<div class="com-empty">🍽️ Henüz kimse paylaşım yapmamış.<br>İlk sen paylaş!</div>';
      return;
    }
    var html='';
    snap.forEach(function(doc){
      var p=doc.data();
      var id=doc.id;
      var timeAgo=comTimeAgo(p.createdAt);
      var isLiked=auth.currentUser&&(p.likes||[]).indexOf(auth.currentUser.uid)>=0;

      html+='<div class="com-card">';
      // Header
      html+='<div class="com-card-header">';
      if(p.photoURL){
        html+='<img class="com-avatar" src="'+p.photoURL+'" onerror="this.style.display=\'none\'">';
      }else{
        html+='<div class="com-avatar-placeholder">'+((p.displayName||'?').charAt(0).toUpperCase())+'</div>';
      }
      html+='<div class="com-user-info"><div class="com-username">'+escComHTML(p.displayName||'Anonim')+'</div><div class="com-time">'+timeAgo+'</div></div>';
      if(p.streak&&p.streak>0){
        html+='<div class="com-streak-badge">🔥 '+p.streak+' gün</div>';
      }
      html+='</div>';

      // Body
      html+='<div class="com-card-body">';
      if(p.text){
        html+='<div style="font-size:.82rem;line-height:1.5;margin-bottom:8px">'+escComHTML(p.text)+'</div>';
      }
      if(p.data){
        var d=p.data;
        var pct=d.target?Math.round(d.cal/d.target*100):0;
        html+='<div class="com-macros-bar">';
        html+='<span style="color:var(--accent)">🔥 '+d.cal+' kcal ('+pct+'%)</span>';
        html+='<span style="color:#ff7a7a">P:'+d.prot+'g</span>';
        html+='<span style="color:#22d3ee">K:'+d.carb+'g</span>';
        html+='<span style="color:#ffcc55">Y:'+d.fat+'g</span>';
        if(d.water)html+='<span>💧'+(d.water/1000).toFixed(1)+'L</span>';
        html+='</div>';
        // Progress bar
        html+='<div style="height:4px;background:var(--glass);border-radius:2px;overflow:hidden"><div style="height:100%;width:'+Math.min(pct,100)+'%;background:var(--accent);border-radius:2px"></div></div>';
      }
      html+='</div>';

      // Footer
      html+='<div class="com-card-footer">';
      html+='<button class="com-action-btn'+(isLiked?' liked':'')+'" onclick="comToggleLike(\''+id+'\')">'+(isLiked?'❤️':'🤍')+' <span style="font-size:.72rem;font-weight:700">'+(p.likeCount||0)+'</span></button>';
      html+='<button class="com-action-btn" onclick="comShowComments(\''+id+'\')">💬 <span style="font-size:.72rem;font-weight:700">'+(p.comments||[]).length+'</span></button>';
      // Kendi postunu silme
      if(auth.currentUser&&p.uid===auth.currentUser.uid){
        html+='<button class="com-action-btn" style="margin-left:auto" onclick="comDeletePost(\''+id+'\')">🗑️</button>';
      }
      html+='</div>';
      html+='</div>';
    });
    el.innerHTML=html;
  }catch(e){
    el.innerHTML='<div class="com-empty">⚠️ Yüklenemedi: '+e.message+'<br><br><button onclick="comLoadFeed()" style="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:.78rem;cursor:pointer">Tekrar Dene</button></div>';
  }
}

async function comToggleLike(postId){
  if(!auth.currentUser)return;
  var uid=auth.currentUser.uid;
  var ref=db.collection('community_posts').doc(postId);
  try{
    var doc=await ref.get();
    if(!doc.exists)return;
    var likes=doc.data().likes||[];
    var idx=likes.indexOf(uid);
    if(idx>=0){likes.splice(idx,1);}
    else{likes.push(uid);}
    await ref.update({likes:likes,likeCount:likes.length});
    comLoadFeed();
  }catch(e){}
}

async function comDeletePost(postId){
  if(!confirm('Bu gönderi silinsin mi?'))return;
  try{
    await db.collection('community_posts').doc(postId).delete();
    comLoadFeed();
    if(typeof showToast==='function')showToast('🗑️ Gönderi silindi');
  }catch(e){}
}

function comShowComments(postId){
  var comment=prompt('Yorumun:');
  if(!comment||!comment.trim())return;
  if(!auth.currentUser)return;
  var ref=db.collection('community_posts').doc(postId);
  ref.get().then(function(doc){
    if(!doc.exists)return;
    var comments=doc.data().comments||[];
    comments.push({
      uid:auth.currentUser.uid,
      name:auth.currentUser.displayName||'Anonim',
      text:comment.trim(),
      createdAt:Date.now()
    });
    return ref.update({comments:comments});
  }).then(function(){
    comLoadFeed();
    if(typeof showToast==='function')showToast('💬 Yorum eklendi');
  });
}

// ═══ LİDERLİK TABLOSU ═══
async function comLoadLeaderboard(sortBy,btn){
  if(btn){
    btn.parentElement.querySelectorAll('.com-tab').forEach(function(t){t.classList.remove('active');});
    btn.classList.add('active');
  }
  var el=document.getElementById('comLeaderboardList');
  el.innerHTML='<div style="text-align:center;padding:20px;color:var(--text2)"><span class="spinner" style="width:20px;height:20px;border-width:2px"></span></div>';

  try{
    var snap=await db.collection('users').limit(50).get();
    var users=[];
    snap.forEach(function(doc){
      var d=doc.data();
      if(!d.displayName&&!d.name)return;
      users.push({
        uid:doc.id,
        name:d.displayName||d.name||'Anonim',
        photo:d.photoURL||'',
        streak:d.streak||0,
        todayCal:d.todayCal||0,
        todayProt:d.todayProt||0,
        logDays:d.logDays||0
      });
    });

    // Sıralama
    if(sortBy==='streak')users.sort(function(a,b){return b.streak-a.streak;});
    else if(sortBy==='cal')users.sort(function(a,b){return b.todayCal-a.todayCal;});
    else if(sortBy==='prot')users.sort(function(a,b){return b.todayProt-a.todayProt;});
    else if(sortBy==='consistency')users.sort(function(a,b){return b.logDays-a.logDays;});

    if(!users.length){
      el.innerHTML='<div class="com-empty">Henüz sıralama verisi yok</div>';
      return;
    }

    var rankEmojis=['🥇','🥈','🥉'];
    var html='';
    users.slice(0,20).forEach(function(u,i){
      var val='';
      if(sortBy==='streak')val='🔥 '+u.streak+' gün';
      else if(sortBy==='cal')val='🔥 '+u.todayCal+' kcal';
      else if(sortBy==='prot')val='💪 '+u.todayProt+'g';
      else val='📅 '+u.logDays+' gün';
      var isMe=auth.currentUser&&u.uid===auth.currentUser.uid;

      html+='<div class="com-leaderboard-item" style="'+(isMe?'border-color:var(--accent);background:var(--accent-glow)':'')+'">';
      html+='<div class="com-lb-rank">'+(i<3?rankEmojis[i]:(i+1))+'</div>';
      if(u.photo){
        html+='<img class="com-avatar" src="'+u.photo+'" style="width:32px;height:32px" onerror="this.style.display=\'none\'">';
      }else{
        html+='<div class="com-avatar-placeholder" style="width:32px;height:32px;font-size:.85rem">'+u.name.charAt(0).toUpperCase()+'</div>';
      }
      html+='<div class="com-lb-info"><div class="com-lb-name">'+escComHTML(u.name)+(isMe?' <span style="font-size:.6rem;color:var(--accent)">(Sen)</span>':'')+'</div>';
      html+='<div class="com-lb-stats">Seri: '+u.streak+' · Kalori: '+u.todayCal+'</div></div>';
      html+='<div class="com-lb-value">'+val+'</div>';
      html+='</div>';
    });
    el.innerHTML=html;
  }catch(e){
    el.innerHTML='<div class="com-empty">⚠️ '+e.message+'</div>';
  }
}

// ═══ MEYDAN OKUMALAR ═══
var COM_CHALLENGES=[
  {id:'water7',title:'💧 7 Gün Su Mücadelesi',desc:'7 gün boyunca günlük su hedefini tamamla',duration:7,type:'water',target:7,icon:'💧'},
  {id:'streak14',title:'🔥 14 Gün Seri',desc:'14 gün üst üste beslenme kaydı gir',duration:14,type:'streak',target:14,icon:'🔥'},
  {id:'protein5',title:'💪 Protein Haftası',desc:'5 gün boyunca günlük protein hedefini aş',duration:7,type:'protein',target:5,icon:'💪'},
  {id:'veggie3',title:'🥬 Sebze Günleri',desc:'Bu hafta 3 gün sadece sebze ağırlıklı ye',duration:7,type:'veggie',target:3,icon:'🥬'},
  {id:'nosugar5',title:'🚫 Şekersiz 5 Gün',desc:'5 gün boyunca şekerli atıştırmalıklardan uzak dur',duration:5,type:'nosugar',target:5,icon:'🚫'},
  {id:'breakfast7',title:'🌅 Kahvaltı Şampiyonu',desc:'7 gün boyunca kahvaltını atlamadan kaydet',duration:7,type:'breakfast',target:7,icon:'🌅'}
];

function comLoadChallenges(){
  var el=document.getElementById('comChallengeList');
  var joined=JSON.parse(localStorage.getItem('fs_challenges')||'{}');

  var html='';
  COM_CHALLENGES.forEach(function(c){
    var progress=joined[c.id]||{day:0,startDate:null};
    var isActive=progress.startDate&&progress.day<c.target;
    var isComplete=progress.day>=c.target;
    var pct=c.target?Math.round(progress.day/c.target*100):0;

    html+='<div class="com-challenge-card">';
    html+='<h4>'+c.icon+' '+c.title+'</h4>';
    html+='<p>'+c.desc+'</p>';
    html+='<div class="com-challenge-progress"><div style="width:'+pct+'%"></div></div>';
    html+='<div class="com-challenge-meta"><span>'+progress.day+'/'+c.target+' tamamlandı</span>';
    if(isComplete){
      html+='<span style="color:var(--green);font-weight:700">✅ Tamamlandı!</span>';
    }else if(isActive){
      html+='<span style="color:var(--accent)">Devam ediyor...</span>';
    }else{
      html+='<button onclick="comJoinChallenge(\''+c.id+'\')" style="background:var(--accent);color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:.65rem;font-weight:700;cursor:pointer;font-family:var(--font,system-ui)">Katıl</button>';
    }
    html+='</div>';
    html+='</div>';
  });

  el.innerHTML=html;
}

function comJoinChallenge(id){
  var joined=JSON.parse(localStorage.getItem('fs_challenges')||'{}');
  joined[id]={day:0,startDate:Date.now()};
  localStorage.setItem('fs_challenges',JSON.stringify(joined));
  comLoadChallenges();
  if(typeof showToast==='function')showToast('🎯 Meydan okumaya katıldın!');
}

// ═══ YARDIMCI FONKSİYONLAR ═══
function comTimeAgo(ts){
  var diff=Date.now()-ts;
  var mins=Math.floor(diff/60000);
  if(mins<1)return 'Az önce';
  if(mins<60)return mins+' dk önce';
  var hours=Math.floor(mins/60);
  if(hours<24)return hours+' saat önce';
  var days=Math.floor(hours/24);
  if(days<7)return days+' gün önce';
  return new Date(ts).toLocaleDateString('tr-TR');
}

function escComHTML(s){
  var d=document.createElement('div');d.textContent=s;return d.innerHTML;
}

// Init
comInit();
</script>
